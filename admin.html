<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - FILAGAMING Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg-dark: #08080a; --card-bg: #15151a; --sidebar-w: 240px; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-brand { font-family: 'Orbitron'; color: var(--gold); text-align: center; font-size: 18px; margin-bottom: 40px; letter-spacing: 2px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #888; font-family: 'Orbitron'; font-size: 12px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: var(--gold); background: rgba(241, 196, 15, 0.1); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { font-family: 'Orbitron'; font-size: 16px; color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .monitor { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444; text-align: center; margin-bottom: 20px; }
        .monitor span { color: #2ecc71; font-family: 'Orbitron'; font-size: 20px; text-shadow: 0 0 10px #2ecc71; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: var(--gold); border-radius: 5px; font-family: 'Orbitron'; text-align: center; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; font-family: 'Orbitron'; font-size: 12px; margin-bottom: 10px; }
        .btn-set { background: var(--gold); color: black; }
        .btn-fake { background: #e74c3c; color: white; }
        .btn-clear { background: none; border: 1px solid #444; color: #666; width: auto; padding: 8px 15px; margin-bottom: 15px; float: right; cursor: pointer; }
        .btn-clear:hover { border-color: #e74c3c; color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 8px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">FILAGAMING</div>
        <div class="nav-item active" onclick="showPage('dashboard', this)">DASHBOARD</div>
        <div class="nav-item" onclick="showPage('member-balances', this)">MEMBER BALANCES</div>
        <div class="nav-item" onclick="showPage('fake-win', this)">FAKE BROADCAST</div>
        <div class="nav-item" onclick="showPage('win-logs', this)">GLOBAL WIN LOG</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <h2>Balance Manager</h2>
            <div class="card" style="max-width: 450px;">
                <div class="monitor"><label style="font-size:9px; color:#666; display:block; margin-bottom:5px;">LAST ACTIVE MEMBER</label><span id="active-display">OFFLINE</span></div>
                <input type="text" id="uid" placeholder="MEMBER ID"><input type="number" id="amt" placeholder="AMOUNT (K)">
                <button class="btn-set" onclick="mod('set')">SET BALANCE</button>
                <button class="btn-set" style="background:#27ae60; color:white;" onclick="mod('add')">TOP UP (+)</button>
                <p id="msg" style="text-align:center; color:gold; font-size:12px;"></p>
            </div>
        </div>

        <div id="member-balances" class="page">
            <h2>All Member Balances</h2>
            <div class="card"><table><thead><tr><th>MEMBER ID</th><th>BALANCE</th></tr></thead><tbody id="balance-table-body"></tbody></table></div>
        </div>

        <div id="fake-win" class="page">
            <h2>Broadcast Fake Win</h2>
            <div class="card" style="max-width: 450px;"><input type="text" id="fake-uid" placeholder="FAKE USERNAME"><input type="text" id="fake-prize" placeholder="PRIZE (e.g. 500K)"><button class="btn-fake" onclick="broadcastFakeWin()">SEND TO LIVE FEED</button></div>
        </div>

        <div id="win-logs" class="page">
            <button class="btn-clear" onclick="clearFirebaseData('global_wins')">CLEAR ALL WINS</button>
            <h2 style="clear:both;">Global Win Log</h2>
            <div id="win-list"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDs0_sSpYenn-keMdcTGoxado8HvW5kqNE",
            authDomain: "filagaming-chat.firebaseapp.com",
            databaseURL: "https://filagaming-chat-default-rtdb.firebaseio.com",
            projectId: "filagaming-chat",
            storageBucket: "filagaming-chat.firebasestorage.app",
            messagingSenderId: "32512501603",
            appId: "1:32512501603:web:31c2a61c06040d1e5ad556"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); el.classList.add('active');
        }

        db.ref('last_active').on('value', (s) => { if(s.exists()) { document.getElementById('active-display').innerText = s.val().id; document.getElementById('uid').value = s.val().id; } });
        db.ref('users').on('value', (s) => {
            const tbody = document.getElementById('balance-table-body'); tbody.innerHTML = "";
            s.forEach((child) => { tbody.innerHTML += `<tr><td style="color:gold; font-family:Orbitron;">${child.key}</td><td style="color:#2ecc71; font-weight:bold;">${child.val().balance}K</td></tr>`; });
        });
        db.ref('global_wins').limitToLast(20).on('value', (s) => {
            const list = document.getElementById('win-list'); list.innerHTML = "";
            const data = []; s.forEach(c => { data.unshift(c.val()); });
            data.forEach(i => { list.innerHTML += `<div style="background:#111; padding:15px; margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between; font-size:13px; border:1px solid #222;"><span>${i.msg}</span><span style="color:#444">${i.time}</span></div>`; });
        });

        function mod(type) {
            const id = document.getElementById('uid').value.toUpperCase().trim();
            const val = parseFloat(document.getElementById('amt').value) || 0; if(!id) return;
            const ref = db.ref('users/' + id);
            ref.once('value').then(s => {
                let cur = s.exists() ? s.val().balance : 0;
                ref.update({ balance: (type === 'set') ? val : cur + val });
                document.getElementById('msg').innerText = `SUCCESS: ${id} updated.`;
            });
        }

        function broadcastFakeWin() {
            const u = document.getElementById('fake-uid').value || "SYSTEM", p = document.getElementById('fake-prize').value || "0K";
            let masked = u.length > 4 ? u.substring(0, 2) + "****" + u.slice(-2) : u.substring(0, 1) + "**";
            
            // EXACT SAME FORMAT AS REAL WINS
            db.ref('global_wins').push({ 
                msg: `<b>${masked}</b> won <span style="color:#FFFFFF">${p}</span>`, 
                time: new Date().toLocaleTimeString() 
            });
            alert("Sent!");
            document.getElementById('fake-uid').value = "";
            document.getElementById('fake-prize').value = "";
        }

        function clearFirebaseData(path) {
            if(confirm("Wipe all data in " + path + "?")) db.ref(path).remove();
        }
    </script>
</body>
</html>
